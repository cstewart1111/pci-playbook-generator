openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: playbooks
    description: Playbook management
  - name: generations
    description: AI generation operations
  - name: dashboard
    description: Dashboard summary data
  - name: knowledge
    description: Knowledge base document management
  - name: travel
    description: Travel optimization operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /playbooks:
    get:
      operationId: listPlaybooks
      tags: [playbooks]
      summary: List all playbooks
      responses:
        "200":
          description: List of playbooks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Playbook"
    post:
      operationId: createPlaybook
      tags: [playbooks]
      summary: Create a new playbook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlaybookBody"
      responses:
        "201":
          description: Created playbook
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Playbook"

  /playbooks/{id}:
    get:
      operationId: getPlaybook
      tags: [playbooks]
      summary: Get a playbook with its patterns
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Playbook with patterns
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaybookWithPatterns"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deletePlaybook
      tags: [playbooks]
      summary: Delete a playbook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /playbooks/{id}/analyze:
    post:
      operationId: analyzeEmails
      tags: [playbooks]
      summary: Analyze emails to extract patterns into a playbook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeEmailsBody"
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /generations:
    get:
      operationId: listGenerations
      tags: [generations]
      summary: List all generations
      responses:
        "200":
          description: List of generations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Generation"

  /generations/email:
    post:
      operationId: generateEmail
      tags: [generations]
      summary: Generate a sales email using playbook patterns
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateEmailBody"
      responses:
        "200":
          description: Generated email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerationResult"

  /generations/script:
    post:
      operationId: generateScript
      tags: [generations]
      summary: Generate a call script using playbook patterns
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateScriptBody"
      responses:
        "200":
          description: Generated script
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerationResult"

  /generations/script-builder:
    post:
      operationId: generateScriptBuilder
      tags: [generations]
      summary: Build personalized call scripts with social proof
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateScriptBuilderBody"
      responses:
        "200":
          description: Generated script with social proof metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScriptBuilderResult"

  /generations/suggest-edits:
    post:
      operationId: suggestEdits
      tags: [generations]
      summary: Suggest edits for a draft email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuggestEditsBody"
      responses:
        "200":
          description: Edit suggestions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerationResult"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /knowledge:
    get:
      operationId: listKnowledgeDocs
      tags: [knowledge]
      summary: List knowledge documents
      parameters:
        - name: playbookId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of knowledge documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KnowledgeDoc"
    post:
      operationId: createKnowledgeDoc
      tags: [knowledge]
      summary: Create a knowledge document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKnowledgeDocBody"
      responses:
        "201":
          description: Created knowledge document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeDoc"

  /knowledge/upload:
    post:
      operationId: uploadKnowledgeDoc
      tags: [knowledge]
      summary: Upload a file as a knowledge document
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                title:
                  type: string
                type:
                  type: string
                playbookId:
                  type: integer
              required:
                - file
                - title
                - type
      responses:
        "201":
          description: Uploaded knowledge document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeDoc"

  /knowledge/{id}:
    get:
      operationId: getKnowledgeDoc
      tags: [knowledge]
      summary: Get a knowledge document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Knowledge document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeDoc"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteKnowledgeDoc
      tags: [knowledge]
      summary: Delete a knowledge document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /travel/optimize-travel:
    get:
      operationId: optimizeTravel
      tags: [travel]
      summary: Optimize travel itinerary for a given date
      parameters:
        - name: date
          in: query
          required: false
          schema:
            type: string
        - name: homeBase
          in: query
          required: false
          schema:
            type: string
        - name: seedAccountId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Optimized travel itinerary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Itinerary"
        "404":
          description: No meetings found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "400":
          description: Geocoding error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /travel/confirm-address:
    post:
      operationId: confirmAddress
      tags: [travel]
      summary: Confirm and normalize a raw address string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmAddressBody"
      responses:
        "200":
          description: Address candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfirmAddressResult"

  /dashboard/recent-generations:
    get:
      operationId: getRecentGenerations
      tags: [dashboard]
      summary: Get recent generation activity
      responses:
        "200":
          description: Recent generations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Generation"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Playbook:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        qualityScore:
          type: integer
          nullable: true
        emailCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - description
        - emailCount
        - createdAt
        - updatedAt

    PlaybookWithPatterns:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        qualityScore:
          type: integer
          nullable: true
        emailCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        patterns:
          type: array
          items:
            $ref: "#/components/schemas/Pattern"
        principles:
          type: array
          items:
            type: string
      required:
        - id
        - name
        - description
        - emailCount
        - createdAt
        - updatedAt
        - patterns
        - principles

    Pattern:
      type: object
      properties:
        id:
          type: integer
        playbookId:
          type: integer
        type:
          type: string
        text:
          type: string
        examples:
          type: array
          items:
            type: string
      required:
        - id
        - playbookId
        - type
        - text
        - examples

    CreatePlaybookBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        icpVerticals:
          type: array
          items:
            type: string
        icpPersonas:
          type: array
          items:
            type: string
        icpPainPoints:
          type: array
          items:
            type: string
        icpDifferentiators:
          type: array
          items:
            type: string
        icpProofPoints:
          type: array
          items:
            type: string
        icpCompanySize:
          type: string
          nullable: true
      required:
        - name
        - description

    AnalyzeEmailsBody:
      type: object
      properties:
        emails:
          type: array
          items:
            type: string
      required:
        - emails

    AnalysisResult:
      type: object
      properties:
        patterns:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              text:
                type: string
              examples:
                type: array
                items:
                  type: string
            required:
              - type
              - text
              - examples
        principles:
          type: array
          items:
            type: string
        qualityScore:
          type: integer
      required:
        - patterns
        - principles
        - qualityScore

    Generation:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        company:
          type: string
          nullable: true
        role:
          type: string
          nullable: true
        output:
          type: string
        playbookId:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - type
        - output
        - createdAt

    GenerationResult:
      type: object
      properties:
        output:
          type: string
        generationId:
          type: integer
      required:
        - output
        - generationId

    GenerateEmailBody:
      type: object
      properties:
        name:
          type: string
        company:
          type: string
        role:
          type: string
        productType:
          type: string
        problemHypothesis:
          type: string
        recentHook:
          type: string
        context:
          type: string
        tone:
          type: string
          enum:
            - professional
            - conversational
            - bold
            - empathetic
            - urgent
          nullable: true
        playbookId:
          type: integer
          nullable: true
      required:
        - name
        - company
        - role
        - productType
        - problemHypothesis
        - recentHook
        - context

    GenerateScriptBody:
      type: object
      properties:
        objective:
          type: string
        context:
          type: string
        playbookId:
          type: integer
          nullable: true
      required:
        - objective
        - context

    GenerateScriptBuilderBody:
      type: object
      properties:
        name:
          type: string
        company:
          type: string
        role:
          type: string
        productType:
          type: string
        scriptType:
          type: string
        context:
          type: string
        playbookId:
          type: integer
          nullable: true
        notes:
          type: array
          items:
            type: string

    SocialProofMeta:
      type: object
      properties:
        orgName:
          type: string
        orgType:
          type: string
        sizeTier:
          type: string
        region:
          type: string
        angle:
          type: string
        intensity:
          type: string
        matchReason:
          type: string
        orgId:
          type: string
        hasOHP:
          type: boolean
      required:
        - orgName
        - orgType
        - sizeTier
        - region
        - angle
        - intensity
        - matchReason
        - orgId
        - hasOHP

    ScriptBuilderResult:
      type: object
      properties:
        output:
          type: string
        generationId:
          type: integer
        socialProof:
          $ref: "#/components/schemas/SocialProofMeta"
          nullable: true
      required:
        - output
        - generationId

    SuggestEditsBody:
      type: object
      properties:
        draftEmail:
          type: string
        playbookId:
          type: integer
          nullable: true
      required:
        - draftEmail

    DashboardStats:
      type: object
      properties:
        totalPlaybooks:
          type: integer
        totalGenerations:
          type: integer
        totalEmailsAnalyzed:
          type: integer
        emailsGenerated:
          type: integer
        scriptsGenerated:
          type: integer
        editsRequested:
          type: integer
      required:
        - totalPlaybooks
        - totalGenerations
        - totalEmailsAnalyzed
        - emailsGenerated
        - scriptsGenerated
        - editsRequested

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    KnowledgeDoc:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        type:
          type: string
        content:
          type: string
        fileName:
          type: string
          nullable: true
        fileType:
          type: string
          nullable: true
        fileSize:
          type: integer
          nullable: true
        playbookId:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - type
        - content
        - createdAt
        - updatedAt

    CreateKnowledgeDocBody:
      type: object
      properties:
        title:
          type: string
        type:
          type: string
        content:
          type: string
        playbookId:
          type: integer
          nullable: true
      required:
        - title
        - type
        - content

    MeetingSlot:
      type: object
      properties:
        id:
          type: string
        address:
          type: string
        scheduledStartTime:
          type: string
          format: date-time
        durationMinutes:
          type: number
        companyId:
          type: string
          nullable: true
        companyName:
          type: string
          nullable: true
        lat:
          type: number
          nullable: true
        lng:
          type: number
          nullable: true
      required:
        - id
        - address
        - scheduledStartTime
        - durationMinutes

    DirectionLeg:
      type: object
      properties:
        origin:
          type: object
          properties:
            address:
              type: string
            lat:
              type: number
            lng:
              type: number
          required:
            - address
            - lat
            - lng
        destination:
          type: object
          properties:
            address:
              type: string
            lat:
              type: number
            lng:
              type: number
          required:
            - address
            - lat
            - lng
        distanceMeters:
          type: number
        durationSeconds:
          type: number
        polyline:
          type: string
          nullable: true
      required:
        - origin
        - destination
        - distanceMeters
        - durationSeconds

    Itinerary:
      type: object
      properties:
        date:
          type: string
        home:
          type: object
          nullable: true
          properties:
            address:
              type: string
            lat:
              type: number
            lng:
              type: number
          required:
            - address
            - lat
            - lng
        meetings:
          type: array
          items:
            $ref: "#/components/schemas/MeetingSlot"
        totalDistanceMeters:
          type: number
        totalDurationSeconds:
          type: number
        directions:
          type: array
          items:
            $ref: "#/components/schemas/DirectionLeg"
      required:
        - date
        - meetings
        - totalDistanceMeters
        - totalDurationSeconds
        - directions

    ConfirmAddressBody:
      type: object
      properties:
        rawAddress:
          type: string
        companyName:
          type: string
          nullable: true
      required:
        - rawAddress

    AddressCandidate:
      type: object
      properties:
        address:
          type: string
        lat:
          type: number
        lng:
          type: number
      required:
        - address
        - lat
        - lng

    ConfirmAddressResult:
      type: object
      properties:
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/AddressCandidate"
      required:
        - candidates
